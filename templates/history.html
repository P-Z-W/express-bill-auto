{% extends "base.html" %}
{% block title %}历史记录 · 毅播快递对账系统{% endblock %}

{% block content %}
<div class="page-title">📋 历史处理记录</div>

<div class="card">
  <div id="history-area">
    <div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">加载中...</div>
  </div>
</div>
{% endblock %}

{% block extra_script %}
<script>
async function loadHistory() {
  const area = document.getElementById('history-area');
  try {
    // ⚠️ V3.0 BugFix：API接口从 /history 改为 /history/api，避免与页面路由冲突
    const res     = await fetch('/history/api');
    const records = await res.json();
    if (!records || records.length === 0) {
      area.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">暂无历史记录</div>';
      return;
    }
    let rows = records.map(r => {
      const badge = r.last_result === '成功' ? `<span class="badge-ok">✅ 成功</span>`
                  : r.last_result === '失败' ? `<span class="badge-fail">❌ 失败</span>`
                  : `<span class="badge-none">— 无记录</span>`;
      return `<tr>
        <td style="font-family:var(--mono);font-weight:500">${r.month}</td>
        <td>${badge}</td>
        <td style="color:var(--muted)">${r.run_count > 0 ? r.run_count + '次' : '—'}</td>
        <td style="color:var(--muted);font-family:var(--mono);font-size:12px">${r.last_time || '—'}</td>
        <td style="color:var(--muted)">${r.last_duration || '—'}</td>
        <td>
          <a href="/download/${r.month}" class="btn btn-outline btn-sm">⬇ 下载</a>
          <a href="/stats?month=${r.month}" class="btn btn-outline btn-sm" style="margin-left:6px">📊 统计</a>
        </td>
      </tr>`;
    }).join('');
    area.innerHTML = `
      <table class="data-table">
        <thead><tr>
          <th>月份</th><th>最后结果</th><th>运行次数</th>
          <th>最后运行时间</th><th>耗时</th><th>操作</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch(e) {
    area.innerHTML = '<div style="color:var(--danger);font-size:13px;padding:12px;">历史记录加载失败</div>';
  }
}
window.addEventListener('load', loadHistory);
</script>
{% endblock %}
