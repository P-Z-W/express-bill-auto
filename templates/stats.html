{% extends "base.html" %}
{% block title %}统计报表 · 毅播快递对账系统{% endblock %}

{% block extra_head %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  .month-selector { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
  .month-selector label { font-size:13px; color:var(--muted); }
  .month-select {
    padding:6px 12px; background:var(--surface); color:var(--text);
    border:1px solid var(--border); border-radius:8px; font-size:13px;
    cursor:pointer; font-family:var(--sans);
  }
  .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px; }
  .chart-box { background:#0a0c12; border-radius:8px; padding:16px; }
  .chart-box.full { grid-column:1/-1; }
  .chart-title { font-size:10px; color:var(--muted); margin-bottom:12px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; }

  .filter-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .filter-tab { font-size:12px; padding:5px 12px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s; }
  .filter-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .search-box { width:100%; padding:8px 12px; margin-bottom:14px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:8px; font-size:13px; font-family:var(--mono); }
  .search-box:focus { outline:none; border-color:var(--accent); }
  .preview-stats { display:flex; gap:20px; margin-bottom:14px; font-size:12px; color:var(--muted); font-family:var(--mono); }
  .preview-stats span { color:var(--text); font-weight:500; }
  .preview-table { width:100%; border-collapse:collapse; font-size:12.5px; }
  .preview-table th { background:var(--bg); color:var(--muted); font-size:11px; padding:8px 10px; text-align:left; border-bottom:0.5px solid var(--border); font-weight:500; white-space:nowrap; }
  .preview-table td { padding:7px 10px; border-bottom:0.5px solid var(--border); color:var(--text); font-family:var(--mono); font-size:12px; }
  .preview-table tr:last-child td { border-bottom:none; }
  .preview-table tr:hover td { background:rgba(255,255,255,0.02); }
  .tag-single    { display:inline-block; font-size:10px; padding:1px 6px; border-radius:3px; background:rgba(79,142,247,0.15);  color:var(--accent); }
  .tag-average   { display:inline-block; font-size:10px; padding:1px 6px; border-radius:3px; background:rgba(107,112,153,0.15); color:var(--muted); }
  .tag-xixi      { display:inline-block; font-size:10px; padding:1px 6px; border-radius:3px; background:rgba(247,149,79,0.15);  color:var(--warn); }
  .tag-unmatched { display:inline-block; font-size:10px; padding:1px 6px; border-radius:3px; background:rgba(247,95,95,0.15);   color:var(--danger); }
  .pagination { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:14px; }
  .page-btn { font-size:12px; padding:5px 12px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; }
  .page-btn:hover:not(:disabled) { color:var(--text); }
  .page-btn:disabled { opacity:0.3; cursor:not-allowed; }
  .page-info { font-size:12px; color:var(--muted); font-family:var(--mono); }

  .unmatched-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:16px; }
  .unmatched-stat { background:#0a0c12; border-radius:8px; padding:16px; text-align:center; }
  .unmatched-stat .u-label { font-size:11px; color:var(--muted); margin-bottom:6px; }
  .unmatched-stat .u-value { font-size:22px; font-weight:600; font-family:var(--mono); }

  .anomaly-summary { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .anomaly-badge {
    display:flex; align-items:center; gap:6px;
    padding:6px 14px; border-radius:20px; font-size:12px; font-weight:500;
    cursor:pointer; transition:all 0.2s;
  }
  .anomaly-badge.high { background:rgba(247,95,95,0.12);  color:var(--danger); border:1px solid rgba(247,95,95,0.25); }
  .anomaly-badge.mid  { background:rgba(247,149,79,0.12); color:var(--warn);   border:1px solid rgba(247,149,79,0.25); }
  .anomaly-badge.high:hover { background:rgba(247,95,95,0.2);  }
  .anomaly-badge.mid:hover  { background:rgba(247,149,79,0.2); }
  .anomaly-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .anomaly-dot.high { background:var(--danger); }
  .anomaly-dot.mid  { background:var(--warn); }

  .anomaly-list { display:flex; flex-direction:column; gap:10px; }
  .anomaly-item { border-radius:8px; border:1px solid var(--border); overflow:hidden; transition:border-color 0.2s; }
  .anomaly-item.high { border-color:rgba(247,95,95,0.3); }
  .anomaly-item.mid  { border-color:rgba(247,149,79,0.3); }
  .anomaly-header {
    display:flex; align-items:center; gap:10px;
    padding:10px 16px; cursor:pointer;
    background:rgba(255,255,255,0.02); user-select:none;
  }
  .anomaly-header:hover { background:rgba(255,255,255,0.04); }
  .anomaly-type  { font-size:13px; font-weight:500; flex:1; }
  .anomaly-count { font-family:var(--mono); font-size:13px; }
  .anomaly-count.high { color:var(--danger); }
  .anomaly-count.mid  { color:var(--warn); }
  .anomaly-pct   { font-size:11px; color:var(--muted); font-family:var(--mono); margin-left:4px; }
  .anomaly-arrow { font-size:11px; color:var(--muted); transition:transform 0.2s; }
  .anomaly-arrow.open { transform:rotate(90deg); }
  .anomaly-detail { display:none; padding:12px 16px; border-top:1px solid var(--border); background:#0a0c12; }
  .anomaly-detail.open { display:block; }
  .anomaly-label { font-size:11px; color:var(--muted); margin-bottom:8px; }
  .anomaly-samples { display:flex; flex-wrap:wrap; gap:6px; }
  .sample-tag {
    font-family:var(--mono); font-size:11px; padding:2px 8px;
    border-radius:4px; background:var(--surface); border:1px solid var(--border); color:var(--muted);
  }
</style>
{% endblock %}

{% block content %}
<div class="page-title">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <rect x="2" y="10" width="3" height="6" rx="1" fill="currentColor"/>
    <rect x="7" y="6" width="3" height="10" rx="1" fill="currentColor"/>
    <rect x="12" y="2" width="3" height="14" rx="1" fill="currentColor"/>
  </svg>
  统计报表
</div>

<!-- 月份选择 -->
<div class="month-selector">
  <label>选择月份：</label>
  <select class="month-select" id="month-select" onchange="loadAll(this.value)">
    <option value="{{ process_month }}">{{ process_month }}（当前月）</option>
  </select>
  <button class="btn btn-outline btn-sm" onclick="loadAll(document.getElementById('month-select').value)">刷新</button>
</div>

<!-- 图表区域 -->
<div class="card">
  <div class="card-title" id="stats-title">数据统计报表</div>
  <div id="stats-area">
    <div style="padding:4px 0;">
      <div class="sk sk-block" style="margin-bottom:12px;"></div>
      <div class="sk sk-text" style="width:60%;"></div>
    </div>
  </div>
</div>

<!-- 未匹配分析 -->
<div class="card" style="margin-top:20px;">
  <div class="card-title" id="unmatched-title">未匹配运单分析</div>
  <div id="unmatched-area">
    <div style="padding:4px 0;">
      <div class="sk sk-block" style="margin-bottom:10px;height:48px;"></div>
      <div class="sk sk-text" style="width:80%;"></div>
    </div>
  </div>
</div>

<!-- 异常运单分析 -->
<div class="card" style="margin-top:20px;">
  <div class="card-title" id="anomaly-title" style="display:flex;align-items:center;justify-content:space-between;">
    <span>异常运单分析</span>
    <a id="anomaly-dl-btn" style="display:none;" class="btn btn-outline btn-sm">下载异常运单</a>
  </div>
  <div id="anomaly-area">
    <div style="padding:4px 0;">
      <div class="sk sk-text" style="width:50%;margin-bottom:10px;"></div>
      <div class="sk sk-text" style="width:70%;"></div>
    </div>
  </div>
</div>

<!-- 对账结果预览 -->
<div class="card" style="margin-top:20px;">
  <div class="card-title" id="preview-title">对账结果预览</div>
  <div id="preview-area">
    <div style="padding:4px 0;">
      <div class="sk sk-text" style="width:100%;margin-bottom:10px;"></div>
      <div class="sk sk-text" style="width:95%;margin-bottom:10px;"></div>
      <div class="sk sk-text" style="width:88%;"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_script %}
<script>
let chartLine = null, chartPie = null, chartBar = null;
let previewState = { month:'', page:1, filter:'all', keyword:'' };
let searchTimer  = null;

// V3.0 BugFix: /history is the page route; month list must use /history/api
async function initMonthSelect() {
  try {
    const res  = await fetch('/history/api');
    const data = await res.json();
    const sel  = document.getElementById('month-select');
    const urlMonth = new URLSearchParams(window.location.search).get('month');
    if (data && data.length > 0) {
      sel.innerHTML = '';
      data.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.month;
        opt.textContent = r.month + (r.month === '{{ process_month }}' ? '（当前月）' : '');
        sel.appendChild(opt);
      });
    }
    const targetMonth = urlMonth || '{{ process_month }}';
    sel.value = targetMonth;
    loadAll(targetMonth);
  } catch(e) {
    loadAll('{{ process_month }}');
  }
}

async function loadAll(month) {
  loadStats(month);
  loadUnmatched(month);
  loadAnomalies(month);
  loadPreview(month, 1, 'all', '');
}

async function loadStats(month) {
  document.getElementById('stats-title').textContent = `数据统计报表 — ${month}`;
  document.getElementById('stats-area').innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">加载中...</div>';
  try {
    const res  = await fetch(`/stats/${month}`);
    const data = await res.json();
    if (!data.team_stats || data.team_stats.length === 0) {
      document.getElementById('stats-area').innerHTML = `<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">${month} 暂无统计数据，请先运行对账</div>`;
      return;
    }

    let summaryHtml = '';
    if (data.team_summary && data.team_summary.length > 0) {
      const summaryRows = data.team_summary.map(r => {
        const isTotal = r.team === '合计';
        const style   = isTotal ? 'font-weight:500;border-top:1px solid var(--border);' : '';
        return `<tr>
          <td style="${style}color:${isTotal ? 'var(--text)' : 'var(--muted)'}">${r.team}</td>
          <td style="${style}text-align:right;color:var(--accent2)">${r.single_amount > 0 ? r.single_amount.toFixed(2) : '—'}</td>
          <td style="${style}text-align:right;color:var(--muted)">${r.average_count > 0 ? r.average_count.toLocaleString() : '—'}</td>
          <td style="${style}text-align:right;color:var(--text);font-weight:${isTotal ? '600' : '400'}">${r.total_amount.toFixed(2)}</td>
        </tr>`;
      }).join('');
      summaryHtml = `
        <div style="margin-top:20px;">
          <div class="chart-title">团队费用汇总</div>
          <table class="preview-table">
            <thead><tr>
              <th>团队</th>
              <th style="text-align:right">单票金额（元）</th>
              <th style="text-align:right">均重票数</th>
              <th style="text-align:right">合计金额（元）</th>
            </tr></thead>
            <tbody>${summaryRows}</tbody>
          </table>
        </div>`;
    }

    document.getElementById('stats-area').innerHTML = `
      <div class="charts-grid">
        <div class="chart-box full"><div class="chart-title">各月总费用趋势</div><canvas id="chart-line" height="80"></canvas></div>
        <div class="chart-box"><div class="chart-title">${month} 各团队费用占比</div><canvas id="chart-pie"></canvas></div>
        <div class="chart-box"><div class="chart-title">${month} 各团队费用明细</div><canvas id="chart-bar"></canvas></div>
      </div>${summaryHtml}`;

    const colors  = ['#4f8ef7','#3dd68c','#f7954f','#f75f5f','#a78bfa','#34d399','#fb923c','#60a5fa','#f472b6','#facc15','#4ade80','#38bdf8'];
    const teams   = data.team_stats.map(t => t.team);
    const amounts = data.team_stats.map(t => t.amount);
    const trend   = data.monthly_trend || [];

    if (chartLine) chartLine.destroy();
    chartLine = new Chart(document.getElementById('chart-line'), {
      type: 'line',
      data: {
        labels: trend.map(t => t.month),
        datasets: [{ label:'总费用（元）', data:trend.map(t => t.total), borderColor:'#4f8ef7', backgroundColor:'rgba(79,142,247,0.08)', borderWidth:2, pointRadius:3, pointBackgroundColor:'#4f8ef7', fill:true, tension:0.35 }]
      },
      options: { responsive:true, plugins:{ legend:{ labels:{ color:'#6b7099', font:{size:12} } } }, scales:{ x:{ticks:{color:'#6b7099'},grid:{color:'rgba(42,45,58,0.8)'}}, y:{ticks:{color:'#6b7099'},grid:{color:'rgba(42,45,58,0.8)'}} } }
    });

    if (chartPie) chartPie.destroy();
    chartPie = new Chart(document.getElementById('chart-pie'), {
      type: 'doughnut',
      data: { labels:teams, datasets:[{ data:amounts, backgroundColor:colors.slice(0, teams.length), borderWidth:0 }] },
      options: { responsive:true, plugins:{ legend:{ position:'right', labels:{ color:'#6b7099', font:{size:11}, padding:12 } } } }
    });

    if (chartBar) chartBar.destroy();
    chartBar = new Chart(document.getElementById('chart-bar'), {
      type: 'bar',
      data: { labels:teams, datasets:[{ label:'费用（元）', data:amounts, backgroundColor:colors.slice(0, teams.length), borderRadius:4 }] },
      options: { responsive:true, plugins:{ legend:{ display:false } }, scales:{ x:{ticks:{color:'#6b7099',maxRotation:30},grid:{color:'rgba(42,45,58,0.8)'}}, y:{ticks:{color:'#6b7099'},grid:{color:'rgba(42,45,58,0.8)'}} } }
    });

  } catch(e) {
    document.getElementById('stats-area').innerHTML = '<div style="color:var(--danger);font-size:13px;padding:12px;">统计数据加载失败</div>';
  }
}

async function loadAnomalies(month) {
  document.getElementById('anomaly-title').querySelector('span').textContent = `异常运单分析 — ${month}`;
  const dlBtn = document.getElementById('anomaly-dl-btn');
  dlBtn.style.display = 'none';
  document.getElementById('anomaly-area').innerHTML =
    '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">加载中...</div>';
  try {
    const res  = await fetch(`/stats/${month}`);
    const data = await res.json();
    const list = data.anomalies || [];

    if (list.length === 0) {
      document.getElementById('anomaly-area').innerHTML =
        '<div style="color:var(--accent2);font-size:13px;padding:12px;">未发现异常运单</div>';
      return;
    }

    dlBtn.href          = `/anomaly/download/${month}`;
    dlBtn.style.display = 'inline-flex';

    const badges = list.map(a => `
      <div class="anomaly-badge ${a.level}" onclick="toggleAnomaly('anomaly-detail-${a.type}', this)">
        <span class="anomaly-dot ${a.level}"></span>
        ${a.type}
        <strong>${a.count}</strong> 条
      </div>`).join('');

    const items = list.map(a => `
      <div class="anomaly-item ${a.level}">
        <div class="anomaly-header" onclick="toggleAnomaly('anomaly-detail-${a.type}', this.querySelector('.anomaly-arrow'))">
          <span class="anomaly-dot ${a.level}"></span>
          <span class="anomaly-type">${a.type}</span>
          <span class="anomaly-count ${a.level}">${a.count.toLocaleString()} 条
            <span class="anomaly-pct">(${a.pct}%)</span>
          </span>
          <span class="anomaly-arrow">▶</span>
        </div>
        <div class="anomaly-detail" id="anomaly-detail-${a.type}">
          <div class="anomaly-label">运单号样本（前5条）：</div>
          <div class="anomaly-samples">
            ${a.samples.length > 0
              ? a.samples.map(s => `<span class="sample-tag">${s}</span>`).join('')
              : '<span style="color:var(--muted);font-size:12px;">无样本数据</span>'}
          </div>
          ${a.type === '未匹配团队' ? `
            <div style="margin-top:10px;font-size:12px;color:var(--muted);line-height:1.8;">
              可能原因：运单号不在数据库订单中，或 SQL 日期范围未覆盖该运单<br>
              可在 <a href="/config" style="color:var(--accent)">配置 → 运行参数</a> 中调整扩展天数
            </div>` : ''}
          ${a.type === '重量异常' ? `
            <div style="margin-top:10px;font-size:12px;color:var(--muted);">
              判断条件：结算重量 ≤ 0 或 ≥ 50kg，建议人工核对原始账单
            </div>` : ''}
          ${a.type === '省份为空' ? `
            <div style="margin-top:10px;font-size:12px;color:var(--muted);">
              目的省份字段为空，计费模式可能判断不准确，建议检查原始账单格式
            </div>` : ''}
          ${a.type === '单票金额为零' ? `
            <div style="margin-top:10px;font-size:12px;color:var(--muted);">
              计费方式为单票但应付金额为0，可能是报价表缺少该省份数据，建议检查
              <a href="/config" style="color:var(--accent)">配置 → 申通/中通报价</a>
            </div>` : ''}
        </div>
      </div>`).join('');

    document.getElementById('anomaly-area').innerHTML = `
      <div class="anomaly-summary">${badges}</div>
      <div class="anomaly-list">${items}</div>`;

  } catch(e) {
    document.getElementById('anomaly-area').innerHTML =
      '<div style="color:var(--danger);padding:12px;">异常分析加载失败</div>';
  }
}

function toggleAnomaly(detailId, arrowEl) {
  const detail = document.getElementById(detailId);
  if (!detail) return;
  const isOpen = detail.classList.contains('open');
  detail.classList.toggle('open', !isOpen);
  const arrow = arrowEl?.classList?.contains('anomaly-arrow')
    ? arrowEl
    : document.querySelector(`#${detailId}`).previousElementSibling.querySelector('.anomaly-arrow');
  if (arrow) arrow.classList.toggle('open', !isOpen);
}

async function loadUnmatched(month) {
  document.getElementById('unmatched-title').textContent = `未匹配运单分析 — ${month}`;
  document.getElementById('unmatched-area').innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:12px;">加载中...</div>';
  try {
    const res  = await fetch(`/unmatched/${month}`);
    const data = await res.json();
    if (!data.ok) {
      document.getElementById('unmatched-area').innerHTML = `<div style="color:var(--muted);padding:12px;text-align:center;">${month} 暂无对账数据，请先运行对账</div>`;
      return;
    }
    const byExpressHtml = Object.entries(data.by_express).map(([type, count]) =>
      `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border);">
        <span style="color:var(--muted)">${type}</span>
        <span style="font-family:var(--mono)">${count.toLocaleString()} 条</span>
      </div>`).join('');
    const samplesHtml = data.samples.length > 0
      ? `<div style="margin-top:12px;font-size:12px;color:var(--muted)">未匹配运单号样本：<span style="font-family:var(--mono);color:var(--text)">${data.samples.join('、')}</span></div>` : '';
    document.getElementById('unmatched-area').innerHTML = `
      <div class="unmatched-grid">
        <div class="unmatched-stat"><div class="u-label">未匹配总数</div><div class="u-value" style="color:var(--danger)">${data.unmatched.toLocaleString()}</div></div>
        <div class="unmatched-stat"><div class="u-label">占总运单比例</div><div class="u-value" style="color:var(--warn)">${data.ratio}%</div></div>
        <div class="unmatched-stat"><div class="u-label">已匹配</div><div class="u-value" style="color:var(--accent2)">${data.matched.toLocaleString()}</div></div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">按快递类型分布：</div>
      ${byExpressHtml}${samplesHtml}
      <div style="margin-top:12px;padding:10px 14px;background:rgba(247,149,79,0.08);border-radius:6px;border-left:3px solid var(--warn);">
        <div style="font-size:12px;color:var(--warn);font-weight:500;margin-bottom:4px;">可能原因</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.8;">
          · 运单号在数据库订单中不存在（快递账单包含非本店订单）<br>
          · SQL查询时间范围未覆盖该运单（可调整 settings.py 中的扩展天数）<br>
          · 运单号格式不一致（空格、小数点等问题）
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('unmatched-area').innerHTML = '<div style="color:var(--danger);padding:12px;">加载失败</div>';
  }
}

async function loadPreview(month, page, filter, keyword) {
  previewState.month   = month   || previewState.month;
  previewState.page    = page    || 1;
  previewState.filter  = filter  !== undefined ? filter  : previewState.filter  || 'all';
  previewState.keyword = keyword !== undefined ? keyword : previewState.keyword || '';
  document.getElementById('preview-title').textContent = `对账结果预览 — ${previewState.month}`;
  document.getElementById('preview-area').innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">加载中...</div>';
  try {
    const params = new URLSearchParams({ page:previewState.page, size:100, filter:previewState.filter, keyword:previewState.keyword });
    const res  = await fetch(`/preview/${previewState.month}?${params}`);
    const data = await res.json();
    if (!data.ok) {
      document.getElementById('preview-area').innerHTML = `<div style="color:var(--muted);padding:12px;text-align:center;">${previewState.month} 暂无对账数据，请先运行对账</div>`;
      return;
    }
    const filters = [
      { key:'all',       label:`全部 (${data.total})` },
      { key:'matched',   label:`已匹配 (${data.matched})` },
      { key:'unmatched', label:`未匹配 (${data.unmatched})` },
      { key:'single',    label:'单票' },
      { key:'average',   label:'全国均重' },
    ];
    const filterHtml = filters.map(f =>
      `<button class="filter-tab ${f.key === previewState.filter ? 'active' : ''}" onclick="loadPreview('',1,'${f.key}')">${f.label}</button>`
    ).join('');
    const rows = data.rows.map(r => {
      const team      = r['所属团队'] || '';
      const teamTag   = team === '未匹配' ? `<span class="tag-unmatched">${team}</span>` : team;
      const method    = r['实际计算方式'] || '';
      let methodTag   = method;
      if (method === '单票')       methodTag = `<span class="tag-single">${method}</span>`;
      if (method === '全国均重')   methodTag = `<span class="tag-average">${method}</span>`;
      if (method.includes('新西')) methodTag = `<span class="tag-xixi">${method}</span>`;
      const amount = r['单票应付金额'];
      return `<tr>
        <td style="color:var(--muted)">${r['运单号'] || ''}</td>
        <td>${teamTag}</td>
        <td>${r['目的省份'] || ''}</td>
        <td style="text-align:right">${r['结算重量'] || ''}</td>
        <td>${r['快递类型'] || ''}</td>
        <td>${methodTag}</td>
        <td style="text-align:right;color:${amount > 0 ? 'var(--accent2)' : 'var(--muted)'}">${amount === '' || amount === null ? '—' : amount}</td>
      </tr>`;
    }).join('');
    const prevDisabled = data.page <= 1 ? 'disabled' : '';
    const nextDisabled = data.page >= data.total_pages ? 'disabled' : '';
    document.getElementById('preview-area').innerHTML = `
      <div class="filter-tabs">${filterHtml}</div>
      <input class="search-box" placeholder="搜索运单号或团队名..." value="${previewState.keyword}"
        oninput="clearTimeout(searchTimer);searchTimer=setTimeout(()=>loadPreview('',1,undefined,this.value),400)">
      <div class="preview-stats">共 <span>${data.filtered}</span> 条 &nbsp;|&nbsp; 已匹配 <span style="color:var(--accent2)">${data.matched}</span> &nbsp;|&nbsp; 未匹配 <span style="color:var(--danger)">${data.unmatched}</span></div>
      <table class="preview-table">
        <thead><tr>
          <th>运单号</th><th>所属团队</th><th>目的省份</th>
          <th style="text-align:right">结算重量</th><th>快递类型</th>
          <th>计费方式</th><th style="text-align:right">应付金额</th>
        </tr></thead>
        <tbody>${rows || '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px;">暂无数据</td></tr>'}</tbody>
      </table>
      <div class="pagination">
        <button class="page-btn" ${prevDisabled} onclick="loadPreview('',${data.page - 1})">← 上一页</button>
        <span class="page-info">第 ${data.page} / ${data.total_pages} 页</span>
        <button class="page-btn" ${nextDisabled} onclick="loadPreview('',${data.page + 1})">下一页 →</button>
      </div>`;
  } catch(e) {
    document.getElementById('preview-area').innerHTML = '<div style="color:var(--danger);padding:12px;">加载失败</div>';
  }
}

window.addEventListener('load', initMonthSelect);
</script>
{% endblock %}
