<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毅播快递对账系统</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --border:  #2a2d3a;
    --accent:  #4f8ef7;
    --accent2: #3dd68c;
    --warn:    #f7954f;
    --danger:  #f75f5f;
    --text:    #e4e6f0;
    --muted:   #6b7099;
    --mono:    'JetBrains Mono', monospace;
    --sans:    'Noto Sans SC', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding-top: 56px; /* 留出固定顶栏高度 */
  }

  /* ==================== 固定顶栏 ==================== */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: rgba(15,17,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 999;
  }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .topbar-logo { font-size:15px; font-weight:700; color:var(--text); }
  .topbar-logo span { color:var(--accent); }
  .topbar-month {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    background: rgba(79,142,247,0.1);
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid rgba(79,142,247,0.2);
  }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .topbar-status { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
  .topbar-dot { width:6px; height:6px; border-radius:50%; background:var(--border); }
  .topbar-dot.running { background:var(--accent); animation:pulse 1.2s ease-in-out infinite; }
  .topbar-dot.done    { background:var(--accent2); }
  .topbar-dot.error   { background:var(--danger); }
  /* 顶栏导航按钮 */
  .nav-btn {
    font-size:12px; color:var(--muted); background:none;
    border:none; cursor:pointer; padding:4px 8px; border-radius:6px;
    transition: color 0.2s, background 0.2s;
  }
  .nav-btn:hover { color:var(--text); background:rgba(255,255,255,0.06); }

  /* ==================== 主体内容 ==================== */
  .page { padding: 24px; }

  /* ---- 主体布局 ---- */
  .main { display:grid; grid-template-columns:360px 1fr; gap:20px; max-width:1100px; }

  /* ---- 卡片 ---- */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; }
  .card-title { font-size:13px; font-weight:500; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:20px; }

  /* ---- 上传区域 ---- */
  .upload-item { margin-bottom:16px; }
  .upload-label { font-size:13px; color:var(--muted); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
  .upload-label .dot { width:6px; height:6px; border-radius:50%; background:var(--border); transition:background 0.3s; }
  .upload-label .dot.done { background:var(--accent2); }
  .upload-box {
    border:1.5px dashed var(--border); border-radius:8px; padding:14px 16px;
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer; transition:border-color 0.2s, background 0.2s;
    position:relative; overflow:hidden;
  }
  .upload-box:hover { border-color:var(--accent); background:rgba(79,142,247,0.04); }
  .upload-box.uploaded { border-color:var(--accent2); border-style:solid; }
  .upload-box input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .upload-filename { font-family:var(--mono); font-size:12px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }
  .upload-filename.placeholder { color:var(--muted); }
  .upload-icon { font-size:18px; flex-shrink:0; }
  .upload-msg { font-size:12px; margin-top:6px; padding:6px 10px; border-radius:6px; font-family:var(--mono); display:none; }
  .upload-msg.show { display:block; }
  .upload-msg.ok  { background:rgba(61,214,140,0.1); color:var(--accent2); }
  .upload-msg.err { background:rgba(247,95,95,0.1); color:var(--danger); }

  /* ---- 按钮 ---- */
  .run-btn {
    width:100%; margin-top:24px; padding:14px;
    background:var(--accent); color:#fff; border:none; border-radius:8px;
    font-size:15px; font-weight:600; font-family:var(--sans);
    cursor:pointer; transition:background 0.2s, transform 0.1s;
  }
  .run-btn:hover:not(:disabled) { background:#3a7ae0; }
  .run-btn:active:not(:disabled) { transform:scale(0.98); }
  .run-btn:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
  .dl-btn {
    width:100%; margin-top:12px; padding:12px;
    background:transparent; color:var(--accent2);
    border:1.5px solid var(--accent2); border-radius:8px;
    font-size:14px; font-weight:500; font-family:var(--sans);
    cursor:pointer; display:none; text-decoration:none; text-align:center;
  }
  .dl-btn:hover { background:rgba(61,214,140,0.08); }
  .dl-btn.show { display:block; }

  /* ---- 进度区域 ---- */
  .log-status { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
  .status-dot { width:8px; height:8px; border-radius:50%; background:var(--border); }
  .status-dot.running { background:var(--accent); animation:pulse 1.2s ease-in-out infinite; }
  .status-dot.done    { background:var(--accent2); }
  .status-dot.error   { background:var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .status-text { font-size:12px; color:var(--muted); font-family:var(--mono); }

  .progress-wrap { margin-bottom:20px; }
  .progress-bar-bg { width:100%; height:8px; background:var(--border); border-radius:4px; overflow:hidden; margin-bottom:8px; }
  .progress-bar-fill { height:100%; background:var(--accent); border-radius:4px; transition:width 0.6s ease; width:0%; }
  .progress-bar-fill.done  { background:var(--accent2); }
  .progress-bar-fill.error { background:var(--danger); }
  .progress-pct { font-family:var(--mono); font-size:13px; color:var(--muted); text-align:right; }

  .steps-wrap { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .step-item {
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    border-radius:8px; background:#0a0c12; border:1px solid var(--border);
    font-size:13px; transition:border-color 0.3s, background 0.3s;
  }
  .step-item.active { border-color:var(--accent);  background:rgba(79,142,247,0.06); }
  .step-item.done   { border-color:var(--accent2); background:rgba(61,214,140,0.06); }
  .step-item.error  { border-color:var(--danger);  background:rgba(247,95,95,0.06); }
  .step-icon { font-size:16px; width:20px; text-align:center; flex-shrink:0; }
  .step-text { color:var(--muted); }
  .step-item.active .step-text { color:var(--accent); }
  .step-item.done   .step-text { color:var(--accent2); }
  .step-item.error  .step-text { color:var(--danger); }
  .elapsed-text { font-family:var(--mono); font-size:12px; color:var(--muted); text-align:center; min-height:20px; }

  /* ---- 历史记录 ---- */
  .hist-table { width:100%; border-collapse:collapse; font-size:13px; }
  .hist-table th { background:var(--bg); color:var(--muted); font-weight:500; font-size:12px; padding:8px 14px; text-align:left; border-bottom:0.5px solid var(--border); }
  .hist-table td { padding:10px 14px; border-bottom:0.5px solid var(--border); color:var(--text); vertical-align:middle; }
  .hist-table tr:last-child td { border-bottom:none; }
  .hist-table tr:hover td { background:rgba(255,255,255,0.02); }
  .badge-ok   { display:inline-block; font-size:11px; font-weight:500; padding:2px 8px; border-radius:4px; background:rgba(61,214,140,0.12); color:#3dd68c; }
  .badge-fail { display:inline-block; font-size:11px; font-weight:500; padding:2px 8px; border-radius:4px; background:rgba(247,95,95,0.12); color:#f75f5f; }
  .badge-none { display:inline-block; font-size:11px; font-weight:500; padding:2px 8px; border-radius:4px; background:rgba(107,112,153,0.12); color:#6b7099; }
  .dl-hist-btn { font-size:12px; padding:4px 12px; border-radius:6px; border:0.5px solid var(--border); background:transparent; color:var(--accent); cursor:pointer; }
  .dl-hist-btn:hover { background:rgba(79,142,247,0.08); }
  .stat-btn { font-size:12px; padding:4px 12px; border-radius:6px; border:0.5px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; margin-left:6px; }
  .stat-btn:hover { background:rgba(255,255,255,0.04); color:var(--text); }

  /* ---- 图表区域 ---- */
  .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:8px; }
  .chart-box { background:#0a0c12; border-radius:8px; padding:16px; }
  .chart-title { font-size:12px; color:var(--muted); margin-bottom:12px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; }
  .chart-full { grid-column:1/-1; }

  /* ---- 对账结果预览 ---- */
  .filter-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .filter-tab {
    font-size:12px; padding:5px 12px; border-radius:6px;
    border:1px solid var(--border); background:transparent;
    color:var(--muted); cursor:pointer; transition:all 0.2s;
  }
  .filter-tab:hover { color:var(--text); border-color:var(--muted); }
  .filter-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .search-box {
    width:100%; padding:8px 12px; margin-bottom:14px;
    background:var(--bg); color:var(--text);
    border:1px solid var(--border); border-radius:8px;
    font-size:13px; font-family:var(--mono);
    transition:border-color 0.2s;
  }
  .search-box:focus { outline:none; border-color:var(--accent); }
  .preview-stats {
    display:flex; gap:20px; margin-bottom:14px;
    font-size:12px; color:var(--muted); font-family:var(--mono);
  }
  .preview-stats span { color:var(--text); font-weight:500; }
  .preview-table { width:100%; border-collapse:collapse; font-size:12.5px; }
  .preview-table th {
    background:var(--bg); color:var(--muted); font-size:11px;
    padding:8px 10px; text-align:left;
    border-bottom:0.5px solid var(--border); font-weight:500;
    white-space:nowrap;
  }
  .preview-table td {
    padding:7px 10px; border-bottom:0.5px solid var(--border);
    color:var(--text); font-family:var(--mono); font-size:12px;
  }
  .preview-table tr:last-child td { border-bottom:none; }
  .preview-table tr:hover td { background:rgba(255,255,255,0.02); }
  .tag-single  { display:inline-block; font-size:10px; padding:1px 6px; border-radius:3px; background:rgba(79,142,247,0.15); color:var(--accent); }
  .tag-average { display:inline-block; font-size:10px; padding:1px 6px; border-radius:3px; background:rgba(107,112,153,0.15); color:var(--muted); }
  .tag-xixi    { display:inline-block; font-size:10px; padding:1px 6px; border-radius:3px; background:rgba(247,149,79,0.15); color:var(--warn); }
  .tag-unmatched { display:inline-block; font-size:10px; padding:1px 6px; border-radius:3px; background:rgba(247,95,95,0.15); color:var(--danger); }
  .pagination { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:14px; }
  .page-btn {
    font-size:12px; padding:5px 12px; border-radius:6px;
    border:1px solid var(--border); background:transparent;
    color:var(--muted); cursor:pointer; transition:all 0.2s;
  }
  .page-btn:hover:not(:disabled) { color:var(--text); border-color:var(--muted); }
  .page-btn:disabled { opacity:0.3; cursor:not-allowed; }
  .page-info { font-size:12px; color:var(--muted); font-family:var(--mono); }

  /* ---- 价格配置 ---- */
  .tab-bar { display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:0; }
  .tab-btn {
    font-size:13px; padding:8px 16px; border:none; background:none;
    color:var(--muted); cursor:pointer; border-bottom:2px solid transparent;
    margin-bottom:-1px; transition:color 0.2s, border-color 0.2s;
  }
  .tab-btn:hover { color:var(--text); }
  .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  .price-table { width:100%; border-collapse:collapse; font-size:13px; }
  .price-table th { background:var(--bg); color:var(--muted); font-size:12px; padding:8px 12px; text-align:left; border-bottom:0.5px solid var(--border); font-weight:500; }
  .price-table td { padding:6px 8px; border-bottom:0.5px solid var(--border); }
  .price-table tr:last-child td { border-bottom:none; }
  .price-input {
    width:90px; padding:4px 8px; font-size:12px; font-family:var(--mono);
    background:var(--bg); color:var(--text);
    border:1px solid var(--border); border-radius:4px;
    text-align:right; transition:border-color 0.2s;
  }
  .price-input:focus { outline:none; border-color:var(--accent); }
  .save-btn {
    margin-top:16px; padding:10px 24px;
    background:var(--accent); color:#fff; border:none; border-radius:8px;
    font-size:13px; font-weight:500; cursor:pointer; transition:background 0.2s;
  }
  .save-btn:hover { background:#3a7ae0; }
  .save-msg { font-size:12px; margin-left:12px; font-family:var(--mono); }
  .charge-row { display:flex; align-items:center; gap:16px; margin-bottom:12px; font-size:13px; }
  .charge-label { color:var(--muted); width:60px; }

  /* 滚动条 */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<!-- 固定顶栏 -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">毅播 <span>快递对账系统</span></div>
    <div class="topbar-month">{{ process_month }}</div>
  </div>
  <div class="topbar-right">
    <div class="topbar-status">
      <div class="topbar-dot" id="topbar-dot"></div>
      <span id="topbar-status-text">就绪</span>
    </div>
    <button class="nav-btn" onclick="navTo('#main-section')">🏠 主页</button>
    <button class="nav-btn" onclick="navTo('#history-section')">📋 历史</button>
    <button class="nav-btn" onclick="navTo('#stats-section')">📊 统计</button>
    <button class="nav-btn" onclick="navTo('#unmatched-section')">⚠️ 未匹配</button>
    <button class="nav-btn" onclick="navTo('#preview-section')">📋 预览</button>
    <button class="nav-btn" onclick="navTo('#price-section')">💰 价格配置</button>
  </div>
</div>

<!-- 主体内容 -->
<div class="page">

  <!-- 主操作区 -->
  <div id="main-section" class="main" style="max-width:1100px;">

    <!-- 左侧：操作面板 -->
    <div class="card">
      <div class="card-title">账单上传 &amp; 运行</div>

      <div class="upload-item">
        <div class="upload-label">
          <span class="dot" id="dot-st"></span>
          <span id="label-st">申通账单</span>
        </div>
        <div class="upload-box" id="box-st">
          <span class="upload-filename placeholder" id="name-st">点击选择文件...</span>
          <span class="upload-icon">📄</span>
          <input type="file" accept=".xlsx" onchange="uploadFile(this, 'st')">
        </div>
        <div class="upload-msg" id="msg-st"></div>
      </div>

      <div class="upload-item">
        <div class="upload-label">
          <span class="dot" id="dot-zt"></span>
          <span id="label-zt">中通账单</span>
        </div>
        <div class="upload-box" id="box-zt">
          <span class="upload-filename placeholder" id="name-zt">点击选择文件...</span>
          <span class="upload-icon">📄</span>
          <input type="file" accept=".xlsx" onchange="uploadFile(this, 'zt')">
        </div>
        <div class="upload-msg" id="msg-zt"></div>
      </div>

      <button class="run-btn" id="run-btn" onclick="startRun()">▶ 开始运行</button>
      <a class="dl-btn" id="dl-btn" href="/download">⬇ 下载结果 ZIP</a>
    </div>

    <!-- 右侧：进度面板 -->
    <div class="card">
      <div class="card-title">运行进度</div>
      <div class="log-status">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">等待运行...</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="progress-pct" id="progress-pct">0%</div>
      </div>
      <div class="steps-wrap">
        <div class="step-item" id="step-1"><span class="step-icon" id="icon-1">⬜</span><span class="step-text">第一步：下载订单数据</span></div>
        <div class="step-item" id="step-2"><span class="step-icon" id="icon-2">⬜</span><span class="step-text">第二步：合并快递账单</span></div>
        <div class="step-item" id="step-3"><span class="step-icon" id="icon-3">⬜</span><span class="step-text">第三步：运单匹配对账</span></div>
        <div class="step-item" id="step-4"><span class="step-icon" id="icon-4">⬜</span><span class="step-text">第四步：按团队拆分账单</span></div>
      </div>
      <div class="elapsed-text" id="elapsed-text"></div>
    </div>
  </div>

  <!-- 历史记录 -->
  <div id="history-section" style="max-width:1100px; margin-top:20px;">
    <div class="card">
      <div class="card-title">历史处理记录</div>
      <div id="history-area"><div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">加载中...</div></div>
    </div>
  </div>

  <!-- 统计报表 -->
  <div id="stats-section" style="max-width:1100px; margin-top:20px;">
    <div class="card">
      <div class="card-title" id="stats-title">数据统计报表</div>
      <div id="stats-area"><div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">点击历史记录中的「📊 统计」按钮查看图表</div></div>
    </div>
  </div>

  <!-- 未匹配运单分析 -->
  <div id="unmatched-section" style="max-width:1100px; margin-top:20px;">
    <div class="card">
      <div class="card-title" id="unmatched-title">未匹配运单分析</div>
      <div id="unmatched-area">
        <div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">点击「📊 统计」按钮后自动加载</div>
      </div>
    </div>
  </div>

  <!-- 对账结果预览 -->
  <div id="preview-section" style="max-width:1100px; margin-top:20px;">
    <div class="card">
      <div class="card-title" id="preview-title">对账结果预览</div>
      <div id="preview-area">
        <div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">点击历史记录中的「⬇ 下载」旁边可预览，或点击下方按钮加载当前月份</div>
        <div style="text-align:center;margin-top:12px;">
          <button class="filter-tab active" onclick="loadPreview(document.querySelector('.topbar-month').textContent.trim(), 1)">📋 加载当前月份对账数据</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 价格配置 -->
  <div id="price-section" style="max-width:1100px; margin-top:20px; margin-bottom:40px;">
    <div class="card">
      <div class="card-title">价格配置</div>

      <!-- Tab切换 -->
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('st')">申通报价</button>
        <button class="tab-btn" onclick="switchTab('zt')">中通报价</button>
        <button class="tab-btn" onclick="switchTab('charge')">充单价格</button>
      </div>

      <!-- 申通报价 -->
      <div class="tab-content active" id="tab-st">
        <div id="price-st-area"><div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">加载中...</div></div>
      </div>

      <!-- 中通报价 -->
      <div class="tab-content" id="tab-zt">
        <div id="price-zt-area"><div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">加载中...</div></div>
      </div>

      <!-- 充单价格 -->
      <div class="tab-content" id="tab-charge">
        <div id="price-charge-area"><div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">加载中...</div></div>
      </div>

      <!-- 保存按钮 -->
      <div style="margin-top:20px; display:flex; align-items:center;">
        <button class="save-btn" onclick="savePrice()">💾 保存修改</button>
        <span class="save-msg" id="save-msg"></span>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
  let uploadedSt = false;
  let uploadedZt = false;
  let pollTimer  = null;
  let chartPie   = null;
  let chartLine  = null;
  let chartBar   = null;
  let priceData  = null;

  const STEP_PROGRESS = { 0:5, 1:25, 2:50, 3:75, 4:100 };

  // ---- 导航滚动 ----
  function navTo(selector) {
    const el = document.querySelector(selector);
    if (!el) return;
    const top = el.getBoundingClientRect().top + window.pageYOffset - 60;
    window.scrollTo({ top: top, behavior: 'smooth' });
  }

  // ---- 上传文件 ----
  async function uploadFile(input, type) {
    const file = input.files[0];
    if (!file) return;
    const nameEl = document.getElementById(`name-${type}`);
    const msgEl  = document.getElementById(`msg-${type}`);
    const boxEl  = document.getElementById(`box-${type}`);
    const dotEl  = document.getElementById(`dot-${type}`);
    nameEl.textContent = file.name;
    nameEl.classList.remove('placeholder');
    showMsg(msgEl, '⏳ 上传中...', '');
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res  = await fetch('/upload', { method:'POST', body:fd });
      const data = await res.json();
      if (data.ok) {
        showMsg(msgEl, data.msg, 'ok');
        boxEl.classList.add('uploaded');
        dotEl.classList.add('done');
        if (type === 'st') uploadedSt = true;
        if (type === 'zt') uploadedZt = true;
      } else {
        showMsg(msgEl, data.msg, 'err');
      }
    } catch(e) {
      showMsg(msgEl, '❌ 上传失败，请重试', 'err');
    }
  }

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className   = 'upload-msg show' + (type ? ' ' + type : '');
  }

  // ---- 开始运行 ----
  async function startRun() {
    const btn   = document.getElementById('run-btn');
    const dlBtn = document.getElementById('dl-btn');
    resetProgress();
    dlBtn.classList.remove('show');
    btn.disabled    = true;
    btn.textContent = '⏳ 运行中...';
    setStatus('running', '任务运行中...');

    try {
      const res  = await fetch('/run', { method:'POST' });
      const data = await res.json();
      if (!data.ok) {
        setStatus('error', '启动失败：' + data.msg);
        btn.disabled    = false;
        btn.textContent = '▶ 开始运行';
        return;
      }
      listenLogs();
      startPolling();
    } catch(e) {
      setStatus('error', '网络错误，请检查服务');
      btn.disabled    = false;
      btn.textContent = '▶ 开始运行';
    }
  }

  // ---- SSE 实时信号 ----
  function listenLogs() {
    const es = new EventSource('/logs');
    es.onmessage = function(e) {
      const msg = JSON.parse(e.data);
      if (msg === '__PING__') return;
      if (msg === '__DONE__') { es.close(); stopPolling(); onTaskDone(); return; }
      if (msg.startsWith('__STEP__')) {
        updateProgress(parseInt(msg.replace('__STEP__', '')));
        return;
      }
      if (msg.startsWith('__STEP_FAIL__')) {
        markStepError(parseInt(msg.replace('__STEP_FAIL__', '')));
        return;
      }
    };
    es.onerror = function() { es.close(); };
  }

  // ---- 进度更新 ----
  function updateProgress(step) {
    const pct  = STEP_PROGRESS[step] || 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-pct').textContent  = pct + '%';
    for (let i = 1; i <= 4; i++) {
      const el   = document.getElementById(`step-${i}`);
      const icon = document.getElementById(`icon-${i}`);
      el.className = 'step-item';
      if (i <= step) { el.classList.add('done');   icon.textContent = '✅'; }
      else if (i === step + 1 && step < 4) { el.classList.add('active'); icon.textContent = '🔄'; }
      else { icon.textContent = '⬜'; }
    }
  }

  function markStepError(step) {
    const el = document.getElementById(`step-${step}`);
    const icon = document.getElementById(`icon-${step}`);
    if (el) { el.className = 'step-item error'; icon.textContent = '❌'; }
    document.getElementById('progress-fill').classList.add('error');
  }

  function resetProgress() {
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-fill').className  = 'progress-bar-fill';
    document.getElementById('progress-pct').textContent  = '0%';
    document.getElementById('elapsed-text').textContent  = '';
    for (let i = 1; i <= 4; i++) {
      document.getElementById(`step-${i}`).className  = 'step-item';
      document.getElementById(`icon-${i}`).textContent = '⬜';
    }
  }

  // ---- 轮询兜底 ----
  function startPolling() {
    stopPolling();
    pollTimer = setInterval(async () => {
      try {
        const res  = await fetch('/status');
        const data = await res.json();
        if (!data.running && data.result && data.result.output_folder) {
          stopPolling(); onTaskDone();
        }
      } catch(e) {}
    }, 3000);
  }
  function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

  // ---- 任务结束 ----
  function onTaskDone() {
    const btn   = document.getElementById('run-btn');
    const dlBtn = document.getElementById('dl-btn');
    btn.disabled    = false;
    btn.textContent = '▶ 再次运行';
    fetch('/status').then(r => r.json()).then(data => {
      const elapsed = (data.result && data.result.elapsed) ? data.result.elapsed : '';
      if (data.result && data.result.success) {
        setStatus('done', elapsed ? `运行完成 ✅  耗时：${elapsed}` : '运行完成 ✅');
        dlBtn.classList.add('show');
        updateProgress(4);
        document.getElementById('progress-fill').classList.add('done');
        document.getElementById('elapsed-text').textContent = elapsed ? `⏱ 本次耗时：${elapsed}` : '';
      } else {
        setStatus('error', '运行异常，请查看 run.log');
        document.getElementById('progress-fill').classList.add('error');
      }
      setTimeout(() => {
        loadHistory();
        const month = document.querySelector('.topbar-month').textContent.trim();
        loadStats(month);
      }, 800);
    });
  }

  function setStatus(state, text) {
    document.getElementById('status-dot').className    = 'status-dot ' + state;
    document.getElementById('status-text').textContent  = text;
    document.getElementById('topbar-dot').className    = 'topbar-dot ' + state;
    document.getElementById('topbar-status-text').textContent = text;
  }

  // ---- 历史记录 ----
  async function loadHistory() {
    const area = document.getElementById('history-area');
    try {
      const res     = await fetch('/history');
      const records = await res.json();
      if (!records || records.length === 0) {
        area.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">暂无历史记录</div>';
        return;
      }
      let rows = records.map(r => {
        const badge   = r.last_result === '成功' ? `<span class="badge-ok">✅ 成功</span>`
                      : r.last_result === '失败' ? `<span class="badge-fail">❌ 失败</span>`
                      : `<span class="badge-none">— 无记录</span>`;
        const dlBtn     = `<button class="dl-hist-btn" onclick="downloadMonth('${r.month}')">⬇ 下载</button>`;
        const statBtn   = `<button class="stat-btn" onclick="loadStats('${r.month}')">📊 统计</button>`;
        const previewBtn = `<button class="stat-btn" onclick="loadPreview('${r.month}', 1)">📋 预览</button>`;
        return `<tr>
          <td style="font-family:var(--mono);font-weight:500">${r.month}</td>
          <td>${badge}</td>
          <td style="color:var(--muted)">${r.run_count > 0 ? r.run_count+'次' : '—'}</td>
          <td style="color:var(--muted);font-family:var(--mono);font-size:12px">${r.last_time || '—'}</td>
          <td style="color:var(--muted)">${r.last_duration || '—'}</td>
          <td>${dlBtn}${statBtn}${previewBtn}</td>
        </tr>`;
      }).join('');
      area.innerHTML = `<table class="hist-table">
        <thead><tr><th>月份</th><th>最后结果</th><th>运行次数</th><th>最后运行时间</th><th>耗时</th><th>操作</th></tr></thead>
        <tbody>${rows}</tbody></table>`;
    } catch(e) {
      area.innerHTML = '<div style="color:var(--danger);font-size:13px;padding:12px;">历史记录加载失败</div>';
    }
  }

  async function downloadMonth(month) { window.location.href = `/download/${month}`; }

  // ---- 统计图表 ----
  async function loadStats(month) {
    document.getElementById('stats-title').textContent = `数据统计报表 — ${month}`;
    document.getElementById('stats-area').innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">加载中...</div>';
    try {
      const res  = await fetch(`/stats/${month}`);
      const data = await res.json();
      if (!data.team_stats || data.team_stats.length === 0) {
        document.getElementById('stats-area').innerHTML = `<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">${month} 暂无统计数据</div>`;
        return;
      }
      // 先构建汇总表HTML
      let summaryHtml = '';
      if (data.team_summary && data.team_summary.length > 0) {
        const summaryRows = data.team_summary.map(r => {
          const isTotal  = r.team === '合计';
          const style    = isTotal ? 'font-weight:500;border-top:1px solid var(--border);' : '';
          const teamCell = isTotal
            ? `<td style="${style}color:var(--text)">合计</td>`
            : `<td style="${style}color:var(--muted)">${r.team}</td>`;
          return `<tr>
            ${teamCell}
            <td style="${style}text-align:right;color:var(--accent2)">${r.single_amount > 0 ? r.single_amount.toFixed(2) : '—'}</td>
            <td style="${style}text-align:right;color:var(--muted)">${r.average_count > 0 ? r.average_count+'单' : '—'}</td>
            <td style="${style}text-align:right;color:var(--text);font-weight:${isTotal?'500':'400'}">${r.total_amount > 0 ? r.total_amount.toFixed(2) : '—'}</td>
          </tr>`;
        }).join('');
        summaryHtml = `
          <div style="margin-top:20px;">
            <div class="chart-title">📋 团队费用汇总表</div>
            <table class="preview-table">
              <thead><tr>
                <th>团队</th>
                <th style="text-align:right">单票费用（元）</th>
                <th style="text-align:right">均重订单数</th>
                <th style="text-align:right">合计（元）</th>
              </tr></thead>
              <tbody>${summaryRows}</tbody>
            </table>
          </div>`;
      }

      // 一次性写入所有内容，避免innerHTML+=破坏canvas
      document.getElementById('stats-area').innerHTML = `
        <div class="charts-grid">
          <div class="chart-box chart-full"><div class="chart-title">📈 各月总费用趋势</div><canvas id="chart-line" height="80"></canvas></div>
          <div class="chart-box"><div class="chart-title">🥧 ${month} 各团队费用占比</div><canvas id="chart-pie"></canvas></div>
          <div class="chart-box"><div class="chart-title">📊 ${month} 各团队费用明细</div><canvas id="chart-bar"></canvas></div>
        </div>
        ${summaryHtml}`;

      // DOM写入后再渲染图表
      const colors = ['#4f8ef7','#3dd68c','#f7954f','#f75f5f','#a78bfa','#34d399','#fb923c','#60a5fa','#f472b6','#facc15','#4ade80','#38bdf8'];
      const teams   = data.team_stats.map(t => t.team);
      const amounts = data.team_stats.map(t => t.amount);
      const trend   = data.monthly_trend || [];

      if (chartLine) chartLine.destroy();
      chartLine = new Chart(document.getElementById('chart-line'), {
        type: 'line',
        data: { labels: trend.map(t => t.month), datasets: [{ label:'总费用（元）', data:trend.map(t => t.total), borderColor:'#4f8ef7', backgroundColor:'rgba(79,142,247,0.1)', borderWidth:2, pointRadius:4, pointBackgroundColor:'#4f8ef7', fill:true, tension:0.3 }] },
        options: { responsive:true, plugins:{ legend:{ labels:{ color:'#6b7099', font:{ size:12 } } } }, scales:{ x:{ ticks:{ color:'#6b7099' }, grid:{ color:'#2a2d3a' } }, y:{ ticks:{ color:'#6b7099' }, grid:{ color:'#2a2d3a' } } } }
      });

      if (chartPie) chartPie.destroy();
      chartPie = new Chart(document.getElementById('chart-pie'), {
        type: 'doughnut',
        data: { labels:teams, datasets:[{ data:amounts, backgroundColor:colors.slice(0,teams.length), borderWidth:0 }] },
        options: { responsive:true, plugins:{ legend:{ position:'right', labels:{ color:'#6b7099', font:{ size:11 }, padding:12 } } } }
      });

      if (chartBar) chartBar.destroy();
      chartBar = new Chart(document.getElementById('chart-bar'), {
        type: 'bar',
        data: { labels:teams, datasets:[{ label:'费用（元）', data:amounts, backgroundColor:colors.slice(0,teams.length), borderRadius:4 }] },
        options: { responsive:true, plugins:{ legend:{ display:false } }, scales:{ x:{ ticks:{ color:'#6b7099', maxRotation:30 }, grid:{ color:'#2a2d3a' } }, y:{ ticks:{ color:'#6b7099' }, grid:{ color:'#2a2d3a' } } } }
      });

      // E. 加载未匹配运单分析
      loadUnmatched(month);

      document.getElementById('stats-section').scrollIntoView({ behavior:'smooth' });
    } catch(e) {
      document.getElementById('stats-area').innerHTML = '<div style="color:var(--danger);font-size:13px;padding:12px;">统计数据加载失败</div>';
    }
  }

  // E. 未匹配运单分析
  async function loadUnmatched(month) {
    const section = document.getElementById('unmatched-section');
    if (!section) return;
    document.getElementById('unmatched-title').textContent = `未匹配运单分析 — ${month}`;
    document.getElementById('unmatched-area').innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:12px;">加载中...</div>';

    try {
      const res  = await fetch(`/unmatched/${month}`);
      const data = await res.json();
      if (!data.ok) {
        document.getElementById('unmatched-area').innerHTML = `<div style="color:var(--danger);padding:12px;">${data.msg}</div>`;
        return;
      }

      const byExpressHtml = Object.entries(data.by_express).map(([type, count]) =>
        `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border);">
          <span style="color:var(--muted)">${type}</span>
          <span style="font-family:var(--mono)">${count.toLocaleString()} 条</span>
        </div>`
      ).join('');

      const samplesHtml = data.samples.length > 0
        ? `<div style="margin-top:12px;font-size:12px;color:var(--muted)">
            未匹配运单号样本：
            <span style="font-family:var(--mono);color:var(--text)">${data.samples.join('、')}</span>
           </div>`
        : '';

      document.getElementById('unmatched-area').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;">
          <div style="background:#0a0c12;border-radius:8px;padding:16px;text-align:center;">
            <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">未匹配总数</div>
            <div style="font-size:22px;font-weight:600;color:var(--danger);font-family:var(--mono)">${data.unmatched.toLocaleString()}</div>
          </div>
          <div style="background:#0a0c12;border-radius:8px;padding:16px;text-align:center;">
            <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">占总运单比例</div>
            <div style="font-size:22px;font-weight:600;color:var(--warn);font-family:var(--mono)">${data.ratio}%</div>
          </div>
          <div style="background:#0a0c12;border-radius:8px;padding:16px;text-align:center;">
            <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">已匹配</div>
            <div style="font-size:22px;font-weight:600;color:var(--accent2);font-family:var(--mono)">${data.matched.toLocaleString()}</div>
          </div>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">按快递类型分布：</div>
        ${byExpressHtml}
        ${samplesHtml}
        <div style="margin-top:12px;padding:10px 14px;background:rgba(247,149,79,0.08);border-radius:6px;border-left:3px solid var(--warn);">
          <div style="font-size:12px;color:var(--warn);font-weight:500;margin-bottom:4px;">可能原因</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.8;">
            · 运单号在数据库订单中不存在（快递账单包含非本店订单）<br>
            · SQL查询时间范围未覆盖该运单（可调整 settings.py 中的扩展天数）<br>
            · 运单号格式不一致（空格、小数点等问题）
          </div>
        </div>`;
    } catch(e) {
      document.getElementById('unmatched-area').innerHTML = '<div style="color:var(--danger);padding:12px;">加载失败</div>';
    }
  }

  // ---- 价格配置 ----
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', ['st','zt','charge'][i] === tab);
    });
    document.querySelectorAll('.tab-content').forEach((el, i) => {
      el.classList.toggle('active', ['tab-st','tab-zt','tab-charge'][i] === `tab-${tab}`);
    });
  }

  async function loadPrice() {
    try {
      const res  = await fetch('/price/get');
      const data = await res.json();
      if (!data.ok) return;
      priceData = data;

      // 渲染申通报价表
      renderPriceTable('price-st-area', data.shentong, 'st');
      renderPriceTable('price-zt-area', data.zhongtong, 'zt');

      // 渲染充单价格
      let chargeHtml = data.charge.map(c => `
        <div class="charge-row">
          <span class="charge-label">${c.type}</span>
          <input class="price-input" id="charge-${c.type}" type="number" step="0.01" value="${c.price}">
          <span style="color:var(--muted);font-size:12px;">元/单</span>
        </div>`).join('');
      document.getElementById('price-charge-area').innerHTML = chargeHtml || '<div style="color:var(--muted);padding:12px;">暂无充单价格数据</div>';

    } catch(e) {
      document.getElementById('price-st-area').innerHTML = '<div style="color:var(--danger);padding:12px;">价格配置加载失败</div>';
    }
  }

  function renderPriceTable(containerId, rows, prefix) {
    if (!rows || rows.length === 0) {
      document.getElementById(containerId).innerHTML = '<div style="color:var(--muted);padding:12px;">暂无数据</div>';
      return;
    }
    const trs = rows.map((r, i) => `
      <tr>
        <td style="color:var(--muted);font-size:13px;">${r.province}</td>
        <td><input class="price-input" data-prefix="${prefix}" data-idx="${i}" data-field="fee_3kg"     type="number" step="0.01" value="${r.fee_3kg}"></td>
        <td><input class="price-input" data-prefix="${prefix}" data-idx="${i}" data-field="fee_over3kg" type="number" step="0.01" value="${r.fee_over3kg}"></td>
        <td><input class="price-input" data-prefix="${prefix}" data-idx="${i}" data-field="unit_price"  type="number" step="0.01" value="${r.unit_price}"></td>
      </tr>`).join('');
    document.getElementById(containerId).innerHTML = `
      <table class="price-table">
        <thead><tr><th>省份</th><th>3kg内面单费</th><th>超3kg面单费</th><th>续重单价</th></tr></thead>
        <tbody>${trs}</tbody>
      </table>`;
  }

  async function savePrice() {
    if (!priceData) return;
    const msgEl = document.getElementById('save-msg');
    msgEl.textContent = '保存中...';
    msgEl.style.color = 'var(--muted)';

    // 收集申通数据
    const stData = priceData.shentong.map((r, i) => ({
      province:    r.province,
      fee_3kg:     parseFloat(document.querySelector(`[data-prefix="st"][data-idx="${i}"][data-field="fee_3kg"]`)?.value || r.fee_3kg),
      fee_over3kg: parseFloat(document.querySelector(`[data-prefix="st"][data-idx="${i}"][data-field="fee_over3kg"]`)?.value || r.fee_over3kg),
      unit_price:  parseFloat(document.querySelector(`[data-prefix="st"][data-idx="${i}"][data-field="unit_price"]`)?.value || r.unit_price),
    }));

    // 收集中通数据
    const ztData = priceData.zhongtong.map((r, i) => ({
      province:    r.province,
      fee_3kg:     parseFloat(document.querySelector(`[data-prefix="zt"][data-idx="${i}"][data-field="fee_3kg"]`)?.value || r.fee_3kg),
      fee_over3kg: parseFloat(document.querySelector(`[data-prefix="zt"][data-idx="${i}"][data-field="fee_over3kg"]`)?.value || r.fee_over3kg),
      unit_price:  parseFloat(document.querySelector(`[data-prefix="zt"][data-idx="${i}"][data-field="unit_price"]`)?.value || r.unit_price),
    }));

    // 收集充单价格
    const chargeData = priceData.charge.map(c => ({
      type:  c.type,
      price: parseFloat(document.getElementById(`charge-${c.type}`)?.value || c.price)
    }));

    try {
      const res  = await fetch('/price/save', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ shentong:stData, zhongtong:ztData, charge:chargeData })
      });
      const data = await res.json();
      if (data.ok) {
        msgEl.textContent = '✅ 保存成功';
        msgEl.style.color = 'var(--accent2)';
      } else {
        msgEl.textContent = '❌ ' + data.msg;
        msgEl.style.color = 'var(--danger)';
      }
    } catch(e) {
      msgEl.textContent = '❌ 保存失败';
      msgEl.style.color = 'var(--danger)';
    }
    setTimeout(() => { msgEl.textContent = ''; }, 3000);
  }

  // ---- 对账结果预览 ----
  let previewState = { month:'', page:1, filter:'all', keyword:'' };
  let searchTimer  = null;

  async function loadPreview(month, page, filter, keyword) {
    previewState.month   = month   || previewState.month;
    previewState.page    = page    || 1;
    previewState.filter  = filter  || previewState.filter  || 'all';
    previewState.keyword = keyword !== undefined ? keyword : previewState.keyword;

    document.getElementById('preview-title').textContent = `对账结果预览 — ${previewState.month}`;
    document.getElementById('preview-area').innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">加载中...</div>';

    try {
      const params = new URLSearchParams({
        page:    previewState.page,
        size:    100,
        filter:  previewState.filter,
        keyword: previewState.keyword
      });
      const res  = await fetch(`/preview/${previewState.month}?${params}`);
      const data = await res.json();

      if (!data.ok) {
        document.getElementById('preview-area').innerHTML = `<div style="color:var(--danger);font-size:13px;padding:12px;">${data.msg}</div>`;
        return;
      }

      const filters = [
        { key:'all',       label:`全部 (${data.total})` },
        { key:'matched',   label:`已匹配 (${data.matched})` },
        { key:'unmatched', label:`未匹配 (${data.unmatched})` },
        { key:'single',    label:'单票' },
        { key:'average',   label:'全国均重' },
      ];
      const filterHtml = filters.map(f =>
        `<button class="filter-tab ${f.key === previewState.filter ? 'active' : ''}" onclick="loadPreview('','1','${f.key}')">${f.label}</button>`
      ).join('');

      const rows = data.rows.map(r => {
        const team = r['所属团队'] || '';
        const teamTag = team === '未匹配' ? `<span class="tag-unmatched">${team}</span>` : team;
        const method  = r['实际计算方式'] || '';
        let methodTag = method;
        if (method === '单票')      methodTag = `<span class="tag-single">${method}</span>`;
        if (method === '全国均重')  methodTag = `<span class="tag-average">${method}</span>`;
        if (method === '新西1-3公斤') methodTag = `<span class="tag-xixi">${method}</span>`;
        const amount = r['单票应付金额'];
        const amountStr = amount === '' || amount === null ? '—' : amount;
        return `<tr>
          <td style="color:var(--muted)">${r['运单号'] || ''}</td>
          <td>${teamTag}</td>
          <td>${r['目的省份'] || ''}</td>
          <td style="text-align:right">${r['结算重量'] || ''}</td>
          <td>${r['快递类型'] || ''}</td>
          <td>${methodTag}</td>
          <td style="text-align:right;color:${amount > 0 ? 'var(--accent2)' : 'var(--muted)'}">${amountStr}</td>
        </tr>`;
      }).join('');

      const prevDisabled = data.page <= 1 ? 'disabled' : '';
      const nextDisabled = data.page >= data.total_pages ? 'disabled' : '';

      document.getElementById('preview-area').innerHTML = `
        <div class="filter-tabs">${filterHtml}</div>
        <input class="search-box" placeholder="搜索运单号或团队名..." value="${previewState.keyword}"
          oninput="clearTimeout(searchTimer); searchTimer=setTimeout(()=>loadPreview('',1,undefined,this.value), 400)">
        <div class="preview-stats">
          共 <span>${data.filtered}</span> 条记录 &nbsp;|&nbsp;
          已匹配 <span style="color:var(--accent2)">${data.matched}</span> &nbsp;|&nbsp;
          未匹配 <span style="color:var(--danger)">${data.unmatched}</span>
        </div>
        <table class="preview-table">
          <thead><tr>
            <th>运单号</th><th>所属团队</th><th>目的省份</th>
            <th style="text-align:right">结算重量</th><th>快递类型</th>
            <th>计费方式</th><th style="text-align:right">应付金额</th>
          </tr></thead>
          <tbody>${rows || '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px;">暂无数据</td></tr>'}</tbody>
        </table>
        <div class="pagination">
          <button class="page-btn" ${prevDisabled} onclick="loadPreview('',${data.page-1})">← 上一页</button>
          <span class="page-info">第 ${data.page} / ${data.total_pages} 页</span>
          <button class="page-btn" ${nextDisabled} onclick="loadPreview('',${data.page+1})">下一页 →</button>
        </div>`;

      document.getElementById('preview-section').scrollIntoView({ behavior:'smooth' });
    } catch(e) {
      document.getElementById('preview-area').innerHTML = '<div style="color:var(--danger);font-size:13px;padding:12px;">加载失败</div>';
    }
  }

  // 页面加载
  window.addEventListener('load', () => {
    loadHistory();
    loadPrice();
    const month = document.querySelector('.topbar-month').textContent.trim();
    loadStats(month);
  });
</script>
</body>
</html>
